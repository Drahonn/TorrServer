name: Build and Push TorrServer

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for new upstream release
        id: check-release
        run: |
          LATEST=$(curl -s https://api.github.com/repos/YouROK/TorrServer/releases/latest | jq -r .tag_name)
          CURRENT=$(git describe --tags --abbrev=0 || echo "none")
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "New release detected: $LATEST"
            echo "new_release=true" >> $GITHUB_OUTPUT
          else
            echo "No new release"
            echo "new_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        if: steps.check-release.outputs.new_release == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up QEMU
        if: steps.check-release.outputs.new_release == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: steps.check-release.outputs.new_release == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check-release.outputs.new_release == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            drahonn/torrserver:latest

      - name: Cleanup old tags except latest
        if: success()
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
        run: |
          TOKEN=$(curl -s -u "${{ secrets.DOCKER_USERNAME }}:${{ secrets.DOCKER_TOKEN }}" \
            "https://hub.docker.com/v2/users/login/" | jq -r .token)

          TAGS=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://hub.docker.com/v2/repositories/$DOCKER_USER/torrserver/tags/?page_size=100" \
            | jq -r '.results // [] | .[].name' \
            | grep -v '^latest$' | grep -v '^sha256-' || true)

          if [ -z "$TAGS" ]; then
            echo "There are no old tags to delete (or the repository is empty)"
          else
            for TAG in $TAGS; do
              echo "Removing the old tag(s): $TAG"
              curl -X DELETE -H "Authorization: Bearer $TOKEN" \
                "https://hub.docker.com/v2/repositories/$DOCKER_USER/torrserver/tags/$TAG/"
            done
          fi
