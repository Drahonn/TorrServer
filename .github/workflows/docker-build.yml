name: Build and Push TorrServer

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest upstream release version
        id: version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/YouROK/TorrServer/releases/latest | jq -r .tag_name)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected upstream version: $VERSION"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/torrserver:latest
            ${{ secrets.DOCKER_USERNAME }}/torrserver:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Cleanup old tags except latest
        if: success()
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
        run: |
          TOKEN=$(curl -s -u "${{ secrets.DOCKER_USERNAME }}:${{ secrets.DOCKER_TOKEN }}" \
            "https://hub.docker.com/v2/users/login/" | jq -r .token)

          TAGS=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://hub.docker.com/v2/repositories/$DOCKER_USER/torrserver/tags/?page_size=100" \
            | jq -r '.results // [] | .[].name' \
            | grep -v '^latest$' | grep -v '^MatriX\.' | grep -v '^sha256-' || true)

          if [ -z "$TAGS" ]; then
            echo "No old tags to delete"
          else
            for TAG in $TAGS; do
              echo "Deleting: $TAG"
              curl -X DELETE -H "Authorization: Bearer $TOKEN" \
                "https://hub.docker.com/v2/repositories/$DOCKER_USER/torrserver/tags/$TAG/"
            done
          fi
