name: Build and Push TorrServer

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # Ежедневно
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for new upstream release
        id: check-release
        run: |
          LATEST=$(curl -s https://api.github.com/repos/YouROK/TorrServer/releases/latest | jq -r .tag_name)
          CURRENT=$(git describe --tags --abbrev=0 || echo "none")
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "New release detected: $LATEST"
            echo "new_release=true" >> $GITHUB_OUTPUT
          else
            echo "No new release"
            echo "new_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        if: steps.check-release.outputs.new_release == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up QEMU
        if: steps.check-release.outputs.new_release == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: steps.check-release.outputs.new_release == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check-release.outputs.new_release == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            drahonn/torrserver:latest
            drahonn/torrserver:${{ github.sha }}

      - name: Scan for vulnerabilities
        if: steps.check-release.outputs.new_release == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'drahonn/torrserver:latest'
          format: 'table'
          exit-code: '1'  # Fail on critical/high
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
